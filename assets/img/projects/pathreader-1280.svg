<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 640 400" role="img" aria-labelledby="pr-title pr-desc">
  <title id="pr-title">Pathreader AI</title>
  <desc id="pr-desc">Pathreader AI — Applied AI product incubator</desc>
  <defs>
    <linearGradient id="roadGrad1280" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="textGrad1280" gradientUnits="userSpaceOnUse" x1="278" y1="0" x2="615" y2="0">
      <stop offset="0%"  stop-color="#0d1b4b"/>
      <stop offset="81%" stop-color="#0d1b4b"/>
      <stop offset="84%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#0044cc"/>
    </linearGradient>
    <clipPath id="arrowClip1280">
      <path d="M 84 120 L 162 120 L 244 200 L 162 280 L 84 280 Q 54 280 54 250 L 54 150 Q 54 120 84 120 Z"/>
    </clipPath>
  </defs>

  <!-- Off-white background -->
  <rect width="640" height="400" fill="#f7f9fc"/>

  <!-- Icon: dark navy arrow/path shape -->
  <path d="M 84 120 L 162 120 L 244 200 L 162 280 L 84 280 Q 54 280 54 250 L 54 150 Q 54 120 84 120 Z" fill="#0d1b4b"/>

  <!-- Winding road inside icon (clipped) -->
  <g clip-path="url(#arrowClip1280)">
    <path d="M 57 268 Q 90 248 118 230 Q 150 208 178 184 Q 208 158 232 138"
          fill="none" stroke="url(#roadGrad1280)" stroke-width="42" stroke-linecap="round"/>
    <path d="M 57 268 Q 90 248 118 230 Q 150 208 178 184 Q 208 158 232 138"
          fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round" opacity="0.68"/>
  </g>

  <!-- Neural network nodes -->
  <line x1="214" y1="137" x2="252" y2="110" stroke="#0d1b4b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="214" y1="137" x2="264" y2="150" stroke="#0d1b4b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="252" y1="110" x2="264" y2="150" stroke="#0d1b4b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="214" cy="137" r="8" fill="#0d1b4b"/>
  <circle cx="252" cy="110" r="8" fill="#0d1b4b"/>
  <circle cx="264" cy="150" r="8" fill="#0d1b4b"/>

  <!-- "Pathreader AI" text with gradient color split -->
  <text x="278" y="210"
        fill="url(#textGrad1280)"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="43" font-weight="700" letter-spacing="-0.5">Pathreader AI</text>

  <!-- Tagline -->
  <text x="278" y="246"
        fill="#6b7280"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="400">Applied AI product incubator</text>
</svg>
