<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" role="img" aria-labelledby="lowspot-title lowspot-desc">
  <title id="lowspot-title">lowspot project artwork</title>
  <desc id="lowspot-desc">Compact dark desktop music client with a system log, playback controls, and text-first library rows.</desc>
  <defs>
    <linearGradient id="lowspotBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1518"/>
      <stop offset="100%" stop-color="#1B2B30"/>
    </linearGradient>
    <linearGradient id="lowspotAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#47B980"/>
      <stop offset="100%" stop-color="#8AD7B0"/>
    </linearGradient>
  </defs>

  <rect width="640" height="400" rx="28" fill="url(#lowspotBg)"/>

  <rect x="56" y="58" width="528" height="284" rx="18" fill="#11171B" stroke="#2A323A" stroke-width="2"/>
  <rect x="56" y="58" width="528" height="34" rx="18" fill="#F4F4F2"/>
  <circle cx="82" cy="75" r="7" fill="#FF5F57"/>
  <circle cx="106" cy="75" r="7" fill="#FFBD2E"/>
  <circle cx="130" cy="75" r="7" fill="#28C840"/>
  <text x="156" y="82" fill="#5C6064" font-family="'Segoe UI',system-ui,-apple-system" font-size="15" font-weight="700">lowspot</text>

  <rect x="74" y="110" width="492" height="98" rx="8" fill="#0A0F12" stroke="#263039"/>
  <g font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="12">
    <text x="92" y="134" fill="#AEB9C3">10:44:48 AM</text>
    <text x="182" y="134" fill="#93A1AD">info</text>
    <text x="228" y="134" fill="#AEB9C3">Mock Spotify mode active.</text>
    <text x="92" y="160" fill="#8FB6D9">10:44:49 AM</text>
    <text x="182" y="160" fill="#8FB6D9">sdk</text>
    <text x="228" y="160" fill="#8FB6D9">Web Playback SDK ready.</text>
    <text x="92" y="186" fill="#AEB9C3">10:45:03 AM</text>
    <text x="182" y="186" fill="#93A1AD">info</text>
    <text x="228" y="186" fill="#AEB9C3">Loaded 2050 cached liked songs.</text>
  </g>

  <rect x="74" y="224" width="492" height="80" rx="8" fill="#151C21" stroke="#263039"/>
  <rect x="92" y="244" width="92" height="28" rx="6" fill="#1C262C" stroke="#47B980" stroke-opacity="0.55"/>
  <text x="108" y="263" fill="#47B980" font-family="'Segoe UI',system-ui,-apple-system" font-size="13" font-weight="700">lowspot on</text>
  <rect x="92" y="280" width="42" height="24" rx="5" fill="#1A2228" stroke="#2A323A"/>
  <text x="105" y="296" fill="#DCE2E8" font-family="'Segoe UI',system-ui,-apple-system" font-size="11">Like</text>
  <rect x="144" y="280" width="54" height="24" rx="5" fill="#1A2228" stroke="#2A323A"/>
  <text x="157" y="296" fill="#DCE2E8" font-family="'Segoe UI',system-ui,-apple-system" font-size="11">Expand</text>

  <text x="228" y="250" fill="#DCE2E8" font-family="'Segoe UI',system-ui,-apple-system" font-size="18" font-weight="700">Artificial Life</text>
  <text x="228" y="272" fill="#93A1AD" font-family="'Segoe UI',system-ui,-apple-system" font-size="13">Operation Ivy</text>
  <rect x="228" y="288" width="250" height="3" rx="2" fill="#2A323A"/>
  <rect x="228" y="288" width="104" height="3" rx="2" fill="url(#lowspotAccent)"/>

  <text x="56" y="370" fill="#DCE2E8" font-family="'Segoe UI',system-ui,-apple-system" font-size="30" font-weight="800">lowspot</text>
  <text x="178" y="370" fill="#8AD7B0" font-family="'Segoe UI',system-ui,-apple-system" font-size="16">text-first Spotify desktop client</text>
