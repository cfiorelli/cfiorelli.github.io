<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 640 400" role="img" aria-labelledby="aif-title aif-desc">
  <title id="aif-title">AI Agent Firewall project artwork</title>
  <desc id="aif-desc">A policy evaluation interface showing a PDF policy document with extracted rules, and an AI agent message being evaluated for compliance with a BLOCKED result.</desc>
  <defs>
    <linearGradient id="aifGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#1A1040"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#aifGrad)" rx="28"/>

  <!-- Left panel: Policy document -->
  <rect x="40" y="48" width="228" height="224" rx="10" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.35"/>
  <text x="58" y="74" fill="#F59E0B" font-family="'Segoe UI',system-ui,-apple-system" font-size="10" font-weight="700" letter-spacing="1.5">POLICY DOCUMENT</text>

  <!-- Document icon with folded corner -->
  <path d="M110 90 L156 90 L176 110 L176 170 L110 170 Z" fill="#1A1445" stroke="#F59E0B" stroke-width="1.5" opacity="0.8" stroke-linejoin="round"/>
  <path d="M156 90 L176 110 L156 110 Z" fill="#2A2060" stroke="#F59E0B" stroke-width="1.5" opacity="0.8" stroke-linejoin="round"/>
  <line x1="122" y1="124" x2="164" y2="124" stroke="#F59E0B" stroke-width="1" opacity="0.4"/>
  <line x1="122" y1="136" x2="164" y2="136" stroke="#F59E0B" stroke-width="1" opacity="0.4"/>
  <line x1="122" y1="148" x2="148" y2="148" stroke="#F59E0B" stroke-width="1" opacity="0.4"/>
  <text x="117" y="187" fill="#F59E0B" font-family="'Segoe UI',system-ui,-apple-system" font-size="10" font-weight="600" opacity="0.85">policy.pdf</text>

  <!-- Extracted rules -->
  <text x="58" y="212" fill="#D4AF37" font-family="'Segoe UI',system-ui,-apple-system" font-size="9" opacity="0.7" letter-spacing="0.8">EXTRACTED RULES</text>

  <rect x="58" y="220" width="7" height="7" rx="1.5" fill="#F59E0B" opacity="0.85"/>
  <text x="73" y="228" fill="#E0E0FF" font-family="'Segoe UI',system-ui,-apple-system" font-size="10" opacity="0.8">No harmful content</text>

  <rect x="58" y="235" width="7" height="7" rx="1.5" fill="#F59E0B" opacity="0.85"/>
  <text x="73" y="243" fill="#E0E0FF" font-family="'Segoe UI',system-ui,-apple-system" font-size="10" opacity="0.8">Cite sources accurately</text>

  <rect x="58" y="250" width="7" height="7" rx="1.5" fill="#F59E0B" opacity="0.85"/>
  <text x="73" y="258" fill="#E0E0FF" font-family="'Segoe UI',system-ui,-apple-system" font-size="10" opacity="0.8">No PII disclosure</text>

  <!-- Center arrow -->
  <line x1="280" y1="160" x2="352" y2="160" stroke="#A78BFA" stroke-width="2" opacity="0.7"/>
  <path d="M346 154 L358 160 L346 166" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.7" stroke-linejoin="round"/>
  <text x="290" y="152" fill="#A78BFA" font-family="'Segoe UI',system-ui,-apple-system" font-size="9" opacity="0.75">evaluate</text>

  <!-- Right panel: Agent message + evaluation -->
  <rect x="372" y="48" width="228" height="224" rx="10" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.35"/>
  <text x="390" y="74" fill="#A78BFA" font-family="'Segoe UI',system-ui,-apple-system" font-size="10" font-weight="700" letter-spacing="1.5">AGENT MESSAGE</text>

  <!-- Message bubble -->
  <rect x="386" y="82" width="198" height="76" rx="6" fill="#1E1B4B" stroke="#A78BFA" stroke-width="1" opacity="0.6"/>
  <text x="398" y="100" fill="#E0E0FF" font-family="'Segoe UI',system-ui,-apple-system" font-size="9.5" opacity="0.85">"Summarize the report and</text>
  <text x="398" y="116" fill="#E0E0FF" font-family="'Segoe UI',system-ui,-apple-system" font-size="9.5" opacity="0.85">email a copy to the user at</text>
  <text x="398" y="132" fill="#E0E0FF" font-family="'Segoe UI',system-ui,-apple-system" font-size="9.5" opacity="0.85">john@example.com"</text>
  <text x="398" y="149" fill="#A78BFA" font-family="'Segoe UI',system-ui,-apple-system" font-size="8.5" opacity="0.6">action: send_email · agent: gpt-4</text>

  <!-- Rule evaluation -->
  <text x="390" y="176" fill="#C4B5FD" font-family="'Segoe UI',system-ui,-apple-system" font-size="9" opacity="0.7" letter-spacing="0.8">RULE EVALUATION</text>

  <rect x="390" y="184" width="7" height="7" rx="1.5" fill="#34D399" opacity="0.9"/>
  <text x="404" y="192" fill="#D0D0F0" font-family="'Segoe UI',system-ui,-apple-system" font-size="9.5" opacity="0.75">No harmful content</text>
  <text x="543" y="192" fill="#34D399" font-family="'Segoe UI',system-ui,-apple-system" font-size="9" font-weight="700">PASS</text>

  <rect x="390" y="199" width="7" height="7" rx="1.5" fill="#34D399" opacity="0.9"/>
  <text x="404" y="207" fill="#D0D0F0" font-family="'Segoe UI',system-ui,-apple-system" font-size="9.5" opacity="0.75">Cite sources accurately</text>
  <text x="543" y="207" fill="#34D399" font-family="'Segoe UI',system-ui,-apple-system" font-size="9" font-weight="700">PASS</text>

  <rect x="390" y="214" width="7" height="7" rx="1.5" fill="#F87171" opacity="0.9"/>
  <text x="404" y="222" fill="#D0D0F0" font-family="'Segoe UI',system-ui,-apple-system" font-size="9.5" opacity="0.75">No PII disclosure</text>
  <text x="543" y="222" fill="#F87171" font-family="'Segoe UI',system-ui,-apple-system" font-size="9" font-weight="700">FAIL</text>

  <!-- BLOCKED badge -->
  <rect x="390" y="234" width="82" height="22" rx="4" fill="#F87171" opacity="0.9"/>
  <text x="400" y="249" fill="#0D0D1A" font-family="'Segoe UI',system-ui,-apple-system" font-size="10" font-weight="700">BLOCKED</text>

  <!-- Bottom label -->
  <text x="40" y="340" fill="#E0E0FF" font-family="'Segoe UI',system-ui,-apple-system" font-size="28" font-weight="700">AI Agent Firewall</text>
  <text x="40" y="370" fill="#A78BFA" font-family="'Segoe UI',system-ui,-apple-system" font-size="15" opacity="0.9">Policy-based compliance for AI agents</text>
</svg>
